name: Update pluginmaster

# Three triggers, all converge on the same rebuild step:
#   - repository_dispatch  : sent by a plugin repo's release workflow on tag push (real-time update)
#   - workflow_dispatch    : manual button in the Actions UI
#   - schedule (6-hourly)  : safety net if a dispatch is lost or a plugin repo's workflow missed it

on:
  repository_dispatch:
    types: [plugin-release]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # for pushing the bot branch
      pull-requests: write     # for opening + auto-merging the refresh PR
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rebuild pluginmaster.json
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/build-pluginmaster.ps1

      - name: Open PR if changed
        # main is branch-protected (PR required). The bot pushes its diff to a
        # short-lived branch and opens a PR, which auto-merges once GitHub
        # confirms it satisfies the protection rules (no CI checks are required
        # for this repo, only the PR-must-exist gate).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet pluginmaster.json; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          BRANCH="bot/refresh-pluginmaster-${{ github.run_id }}"
          DISPATCH_PAYLOAD='${{ toJSON(github.event.client_payload) }}'
          git checkout -b "$BRANCH"
          git add pluginmaster.json
          git commit -m "chore: refresh pluginmaster.json" \
                     -m "Triggered by: ${{ github.event_name }}" \
                     -m "Payload: $DISPATCH_PAYLOAD"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: refresh pluginmaster.json" \
            --body "Auto-generated by the \`update\` workflow.

          Triggered by: \`${{ github.event_name }}\`
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Try auto-merge first (sets the queue if checks are pending); fall back
          # to a direct merge when the PR is already in 'clean' status — which is
          # the common case here because DalamudRepo has no required CI checks.
          gh pr merge "$BRANCH" --squash --auto --delete-branch \
            || gh pr merge "$BRANCH" --squash --delete-branch
