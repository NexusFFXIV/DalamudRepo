name: Update pluginmaster

# Three triggers, all converge on the same rebuild step:
#   - repository_dispatch  : sent by a plugin repo's release workflow on tag push (real-time update)
#   - workflow_dispatch    : manual button in the Actions UI
#   - schedule (every 48h) : safety net for missed dispatches + drift in external upstream pools.
#                            48h instead of 6h: the zip-fallback used to inflate upstream
#                            download_counts on every run, which produced fake "refresh" PRs.
#                            With snapshot.json caching that's gone, but a long cadence is still
#                            the right default — external repos don't ping us, but they also
#                            don't release every six hours.

on:
  repository_dispatch:
    types: [plugin-release]
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # for pushing the bot branch
      pull-requests: write     # for opening + auto-merging the refresh PR
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Rebuild pluginmaster.json
        # Capture all output streams (incl. Write-Host) via Start-Transcript so
        # the email step downstream can attach the structured build log.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Start-Transcript -Path build.log -IncludeInvocationHeader:$false | Out-Null
          try {
            ./scripts/build-pluginmaster.ps1
          } finally {
            Stop-Transcript | Out-Null
          }

      - name: Open PR if changed
        # main is branch-protected (PR required). The bot pushes its diff to a
        # short-lived branch and opens a PR, which auto-merges once GitHub
        # confirms it satisfies the protection rules (no CI checks are required
        # for this repo, only the PR-must-exist gate).
        # Diff covers all four pluginmaster outputs plus snapshot.json — a
        # change in any of them triggers a refresh PR. Including snapshot.json
        # in the diff makes the zip-fallback cache durable: new (plugin,
        # version) entries get persisted on the same run that needed them.
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          PM_FILES="pluginmaster.json external-repo.json common-repo.json gen-repo.json all-repo.json"
          TRACKED_FILES="$PM_FILES cache/snapshot.json"
          # Stage first so newly-created files (not in HEAD) also show up in
          # the diff — plain `git diff` would miss untracked outputs.
          git add -- $TRACKED_FILES
          if git diff --cached --quiet -- $TRACKED_FILES; then
            echo "No changes — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          BRANCH="bot/refresh-pluginmaster-${{ github.run_id }}"
          DISPATCH_PAYLOAD='${{ toJSON(github.event.client_payload) }}'
          git checkout -b "$BRANCH"
          git add -- $TRACKED_FILES
          git commit -m "chore: refresh pluginmaster.json" \
                     -m "Triggered by: ${{ github.event_name }}" \
                     -m "Payload: $DISPATCH_PAYLOAD"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: refresh pluginmaster.json" \
            --body "Auto-generated by the \`update\` workflow.

          Triggered by: \`${{ github.event_name }}\`
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Direct merge — DalamudRepo has no required CI checks, so --auto
          # would just queue a merge that resolves immediately anyway. We tried
          # that pattern (--auto || direct) and it left bot branches orphaned:
          # the --auto path occasionally accepted the call silently (queueing
          # the merge) but never honored the delete-branch preference, so the
          # fallback never ran and the branch stayed behind. Direct merge with
          # --delete-branch deletes reliably.
          gh pr merge "$BRANCH" --squash --delete-branch

      - name: Email notification on change
        # Skipped silently if either the file didn't change OR the SMTP_HOST
        # repo secret isn't configured yet (so the workflow doesn't fail until
        # the user is ready to receive mails).
        # Required repo secrets: SMTP_HOST, SMTP_PORT, SMTP_USERNAME,
        # SMTP_PASSWORD, MAIL_TO.
        if: steps.pr.outputs.changed == 'true' && env.SMTP_HOST != ''
        uses: dawidd6/action-send-mail@v17
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          # Port 587 uses STARTTLS (secure:false); port 465 wants implicit TLS
          # (secure:true). Gmail on 587 → STARTTLS, so keep this false.
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: NexusFFXIV DalamudRepo Bot <${{ secrets.SMTP_USERNAME }}>
          subject: "NexusFFXIV [DalamudRepo] pluginmaster.json refreshed (${{ github.event_name }})"
          body: file://build.log
          attachments: pluginmaster.json,external-repo.json,common-repo.json,gen-repo.json,all-repo.json
