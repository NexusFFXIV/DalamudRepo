name: Update pluginmaster

# Three triggers, all converge on the same rebuild step:
#   - repository_dispatch  : sent by a plugin repo's release workflow on tag push (real-time update)
#   - workflow_dispatch    : manual button in the Actions UI
#   - schedule (6-hourly)  : safety net if a dispatch is lost or a plugin repo's workflow missed it

on:
  repository_dispatch:
    types: [plugin-release]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # for pushing the bot branch
      pull-requests: write     # for opening + auto-merging the refresh PR
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Rebuild pluginmaster.json
        # Capture all output streams (incl. Write-Host) via Start-Transcript so
        # the email step downstream can attach the structured build log.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Start-Transcript -Path build.log -IncludeInvocationHeader:$false | Out-Null
          try {
            ./scripts/build-pluginmaster.ps1
          } finally {
            Stop-Transcript | Out-Null
          }

      - name: Open PR if changed
        # main is branch-protected (PR required). The bot pushes its diff to a
        # short-lived branch and opens a PR, which auto-merges once GitHub
        # confirms it satisfies the protection rules (no CI checks are required
        # for this repo, only the PR-must-exist gate).
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet pluginmaster.json; then
            echo "No changes — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          BRANCH="bot/refresh-pluginmaster-${{ github.run_id }}"
          DISPATCH_PAYLOAD='${{ toJSON(github.event.client_payload) }}'
          git checkout -b "$BRANCH"
          git add pluginmaster.json
          git commit -m "chore: refresh pluginmaster.json" \
                     -m "Triggered by: ${{ github.event_name }}" \
                     -m "Payload: $DISPATCH_PAYLOAD"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: refresh pluginmaster.json" \
            --body "Auto-generated by the \`update\` workflow.

          Triggered by: \`${{ github.event_name }}\`
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Try auto-merge first (sets the queue if checks are pending); fall back
          # to a direct merge when the PR is already in 'clean' status — which is
          # the common case here because DalamudRepo has no required CI checks.
          gh pr merge "$BRANCH" --squash --auto --delete-branch \
            || gh pr merge "$BRANCH" --squash --delete-branch

      - name: Email notification on change
        # Skipped silently if either the file didn't change OR the SMTP_HOST
        # repo secret isn't configured yet (so the workflow doesn't fail until
        # the user is ready to receive mails).
        # Required repo secrets: SMTP_HOST, SMTP_PORT, SMTP_USERNAME,
        # SMTP_PASSWORD, MAIL_TO.
        if: steps.pr.outputs.changed == 'true' && env.SMTP_HOST != ''
        uses: dawidd6/action-send-mail@v4
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: NexusFFXIV DalamudRepo Bot <${{ secrets.SMTP_USERNAME }}>
          subject: "[DalamudRepo] pluginmaster.json refreshed (${{ github.event_name }})"
          body: file://build.log
          attachments: pluginmaster.json
