# Third-party Dalamud plugin repositories that this repo re-exposes for
# convenience. The build script fetches each pluginmaster.json (or single-plugin
# manifest) listed here and folds all plugin entries into pluginmaster.json.
#
# Deduplication: when the same InternalName appears in multiple sources (this
# file, external-plugins.yml, plugins.yml, or two different external repos),
# the entry with the HIGHEST AssemblyVersion wins.
#
# To add a repo: append its URL. To pause a repo: comment the line out.

externalRepos:
  - https://raw.githubusercontent.com/LeonBlade/DalamudPlugins/main/repo.json
  - https://raw.githubusercontent.com/jawslouis/MakePlacePlugin/master/MakePlacePlugin.json
  - https://github.com/LiangYuxuan/dalamud-plugin-cn-fetcher/raw/master/pluginmaster_gh.json
  - https://raw.githubusercontent.com/xivdev/Penumbra/master/repo.json
  - https://raw.githubusercontent.com/Ottermandias/Glamourer/main/repo.json
  - https://raw.githubusercontent.com/Ottermandias/SeaOfStars/main/repo.json
  - https://raw.githubusercontent.com/Drakansoul/DisPlace/master/DisPlacePlugin.json
  - https://raw.githubusercontent.com/reckhou/DalamudPlugins-Ori/api6/pluginmaster.json
  - https://raw.githubusercontent.com/Ricimon/FFXIV-ProximityVoiceChat/refs/heads/master/repo.json
  - https://repo.lightless-sync.org/
  - https://love.puni.sh/ment.json
  - https://puni.sh/api/repository/veyn
  - https://github.com/NightmareXIV/MyDalamudPlugins/raw/main/pluginmaster.json
  - https://raw.githubusercontent.com/FFXIV-CombatReborn/CombatRebornRepo/main/pluginmaster.json
  - https://raw.githubusercontent.com/anya-hichu/DalamudPluginRepo/main/custom.json
  - https://puni.sh/api/repository/jukka
  - https://raw.githubusercontent.com/Jrogo7/VenueManager/master/repo.json
  - https://raw.githubusercontent.com/GitPaulo/FFXIVRankings/master/repo.json
  - https://raw.githubusercontent.com/Waitsnake/NotesPal/refs/heads/main/repo.json
