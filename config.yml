# Build configuration for scripts/build-pluginmaster.ps1.
#
# minDalamudApiLevel — drop any entry whose `DalamudApiLevel` is below this
# from every source pool. Missing field also drops the entry.
#
# sources — per-file enable toggles, keyed by the basename of files in
# sources/. `default:` controls behaviour for any sources/*.yml NOT explicitly
# listed here:
#   default: true   = new source files are built automatically
#   default: false  = new source files are ignored until you opt them in
# Explicit `true` / `false` per filename always overrides the default.
#
# all — the union output (curated sources only, gen scopes are excluded).

minDalamudApiLevel: 15

sources:
  default: false
  plugins.yml: true
  external-plugins.yml: true
  external-repos.yml: true
  external-repos-gen.yml: true

all:
  enabled: true
  out: all-repo.json
